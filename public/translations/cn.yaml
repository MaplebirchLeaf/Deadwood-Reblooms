'Deadwood Reblooms': 枯木逢春

'Deadwood Reblooms Solar Eclipse / clear / default / 0': 太阳边缘被阴影咬开一道缺口，明亮的白昼微微发暗，天空浮起一层淡淡的黄雾。
'Deadwood Reblooms Solar Eclipse / clear / default / 1': 阴影继续向太阳中心推进，街道上的色彩逐渐褪淡，远处的轮廓像被灰尘轻轻盖住。
'Deadwood Reblooms Solar Eclipse / clear / default / 2': 日光明显衰弱，晴空泛出暗金色，四周的声音似乎也被压低了一些。
'Deadwood Reblooms Solar Eclipse / clear / default / 3': 太阳几乎完全沉入阴影，短暂的白昼变得昏暗，只剩一圈冷淡的金色光晕悬在天上。
'Deadwood Reblooms Solar Eclipse / clear / default / 4': 阴影开始从太阳中心移开，光线缓慢回升，但天空仍残留着不自然的暗黄色。
'Deadwood Reblooms Solar Eclipse / clear / default / 5': 太阳重新露出大半，街道逐渐恢复亮度，屋檐和云边还沾着一层淡淡的昏黄。
'Deadwood Reblooms Solar Eclipse / clear / default / 6': 最后一缕阴影从太阳边缘退去，天空慢慢恢复正常，只留下片刻怪异的余光。

'Deadwood Reblooms Solar Eclipse / lightClouds / default / 0': 薄云从太阳前方掠过，云缘先染上一点浅黄，像天空提前露出了异样的征兆。
'Deadwood Reblooms Solar Eclipse / lightClouds / default / 1': 太阳缺口逐渐扩大，云层边缘暗了下来，透过云隙的光不再清澈。
