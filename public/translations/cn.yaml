'Deadwood Reblooms Solar Eclipse / lightClouds / default / 3': 最深的阴影压进云层，天空像旧纸一样暗下去，只在边缘透出一圈暗金色。
'Deadwood Reblooms Solar Eclipse / lightClouds / default / 4': 太阳的亮度开始恢复，困在云中的黄灰色逐渐松散，却还没有完全散开。
'Deadwood Reblooms Solar Eclipse / lightClouds / default / 5': 云朵慢慢恢复浅白，只有被阳光穿过的地方仍带着一点灰黄的边。
'Deadwood Reblooms Solar Eclipse / lightClouds / default / 6': 天空重新变亮，薄云恢复轻淡，几缕异色云痕也渐渐散去。

