'deadwoodReblooms.LongerCombat.npc.mouth.anusentrance': <span class='lblue'>嘴唇贴在诱人的屁眼上，舌尖轻轻顶着褶皱。</span>
'deadwoodReblooms.LongerCombat.npc.mouth.anusimminent': <span class='purple'>嘴唇吻上你可口的屁眼，舌头用力顶开紧缩的括约肌。</span>
'deadwoodReblooms.LongerCombat.npc.mouth.penisimminent': <span class='purple'>嘴唇含住龟头，舌尖在马眼上打转，吞入半根肉棒。</span>
