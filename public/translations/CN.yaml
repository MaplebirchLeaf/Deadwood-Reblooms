'deadwoodReblooms.LongerCombat.npc.mouth.chestimminent': <span class='purple'>嘴唇含住你挺立的乳头，用力吸吮，舌尖快速拨弄。</span>
'deadwoodReblooms.LongerCombat.npc.mouth.penis': <span class='lewd'>嘴深深含住你的肉棒，喉咙收紧，头部快速上下起伏，每一次都顶到喉咙最深处。</span>
'deadwoodReblooms.LongerCombat.npc.mouth.vagina': <span class='lewd'>舌头伸进你湿透的蜜穴，模仿性交的动作抽插，鼻尖蹭着你的阴蒂。</span>
