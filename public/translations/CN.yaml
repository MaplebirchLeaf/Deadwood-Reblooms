'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.0': 才这么一会儿你就想停？我下面还湿得不行，继续干我。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.1': 别急着喘气，我还没高潮呢，再把我填满一点。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.2': 刚刚那点前戏根本不够，我要你更深更狠地进来。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.3': 看你那穴还在滴水，我反而更想把你干到腿软。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.4': 你不会真以为一次就够了吧？我要你射到我满意为止。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.5': 我才刚尝到味道，别停——继续插，我要更多。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.6': 别躲开，你明明夹得那么紧，再给我来一轮。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.7': 再撑一会儿，你里面都还在颤呢，我可舍不得拔出来。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.8': 你现在要是敢停，我就骑上来自己动，直到你求饶。
'deadwoodReblooms.LongerCombat.npc.consensual.teen.f.9': 继续吧，我想看你还能坚持多久不叫出来。

'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.0': 别这么快结束，这种时候慢慢磨才有意思——我想听你喘到失神。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.1': 再来一次，这次我要把你干到连名字都忘掉。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.2': 你刚刚那副欲求不满的样子，可不像想结束。再把腿张开点。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.3': 继续吧，我想多欣赏一会儿你被操到眼神涣散的表情。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.4': 我们都知道，你那里面还在绞着呢——别装，再让我来一轮。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.5': 别急着离开，你的体液还沾在我身上，再来一次。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.6': 再撑一轮，你连站都站不稳了，但我可还没尽兴。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.7': 气氛刚好，你下面那张嘴还在一张一合呢——别破坏它。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.8': 既然都湿成这样了，就别假装矜持，让我继续操到你哭出来。
'deadwoodReblooms.LongerCombat.npc.consensual.adult.f.9': 再来一次，这次我会慢一点，让你清清楚楚感受每一寸进去出来。

'deadwoodReblooms.LongerCombat.npc.forced.teen.f.0': 别想着结束，我才刚把你扒光，今晚不把我喂饱你别想走。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.1': 你以为撑过刚刚那几下就完了？我要捅到你里面全是我的味道。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.2': 站好，把屁股抬起来——还没轮到你休息。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.3': 别躲，你越扭我插得越深，给我老实待着。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.4': 再来一次，你没资格拒绝——除非你想让我更粗暴。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.5': 别乱动，我说继续就是继续，把你那穴再给我露出来。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.6': 刚刚只是热身，现在我要把你干到只能像母狗一样趴着喘。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.7': 你还能撑得住，我看你下面都还在流水呢，再来。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.8': 别装可怜，你那副又痛又爽的样子只会让我更想把你操到失禁。
'deadwoodReblooms.LongerCombat.npc.forced.teen.f.9': 再来一轮，我不爽够之前，你下面那张嘴都不许合上。

'deadwoodReblooms.LongerCombat.npc.forced.adult.f.0': 别动，我还没高潮，你嘴里必须给我接好了。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.1': 你撑得住，我会让你继续——把腿抬起来，我要看到你被操到翻白眼。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.2': 站稳了，再来一次。这次我要顶到你最深。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.3': 现在停下来？你敢松一下我就直接塞回去，听明白没有。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.4': 继续，你没有选择——直到我满意为止，你连合上腿的权力都没有。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.5': 别挣扎，你每动一下我就多插十分钟。想早点结束就给我乖乖配合。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.6': 看着我，我们还要继续——我要你盯着我的眼睛感受我全部进去再抽出来。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.7': 我说结束之前都不会结束，哪怕你哭着求我也没用，继续给我动。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.8': 别想着逃，你的身体已经被我操出反射了——再来一轮，我要听你带哭腔的叫床。
'deadwoodReblooms.LongerCombat.npc.forced.adult.f.9': 安静点，你只需要张开嘴，呼吸和挨操——再来一次，这次我要让你记住什么叫满出来。

