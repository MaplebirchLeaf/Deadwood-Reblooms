# 日蚀
'deadwoodReblooms.SolarEclipse.clear.default.0': 太阳边缘被阴影咬开一道缺口，明亮的白昼微微发暗，天空浮起一层淡淡的黄雾。
'deadwoodReblooms.SolarEclipse.clear.default.1': 阴影继续向太阳中心推进，街道上的色彩逐渐褪淡，远处的轮廓像被灰尘轻轻盖住。
'deadwoodReblooms.SolarEclipse.clear.default.2': 日光明显衰弱，晴空泛出暗金色，四周的声音似乎也被压低了一些。
'deadwoodReblooms.SolarEclipse.clear.default.3': 太阳几乎完全沉入阴影，短暂的白昼变得昏暗，只剩一圈冷淡的金色光晕悬在天上。
'deadwoodReblooms.SolarEclipse.clear.default.4': 阴影开始从太阳中心移开，光线缓慢回升，但天空仍残留着不自然的暗黄色。
'deadwoodReblooms.SolarEclipse.clear.default.5': 太阳重新露出大半，街道逐渐恢复亮度，屋檐和云边还沾着一层淡淡的昏黄。
'deadwoodReblooms.SolarEclipse.clear.default.6': 最后一缕阴影从太阳边缘退去，天空慢慢恢复正常，只留下片刻怪异的余光。

'deadwoodReblooms.SolarEclipse.lightClouds.default.0': 薄云从太阳前方掠过，云缘先染上一点浅黄，像天空提前露出了异样的征兆。
'deadwoodReblooms.SolarEclipse.lightClouds.default.1': 太阳缺口逐渐扩大，云层边缘暗了下来，透过云隙的光不再清澈。
'deadwoodReblooms.SolarEclipse.lightClouds.default.2': 薄云在昏黄天幕下缓慢移动，云影比平时更深，空气也显得沉了几分。
'deadwoodReblooms.SolarEclipse.lightClouds.default.3': 最深的阴影压进云层，天空像旧纸一样暗下去，只在边缘透出一圈暗金色。
'deadwoodReblooms.SolarEclipse.lightClouds.default.4': 太阳的亮度开始恢复，困在云中的黄灰色逐渐松散，却还没有完全散开。
'deadwoodReblooms.SolarEclipse.lightClouds.default.5': 云朵慢慢恢复浅白，只有被阳光穿过的地方仍带着一点灰黄的边。
'deadwoodReblooms.SolarEclipse.lightClouds.default.6': 天空重新变亮，薄云恢复轻淡，几缕异色云痕也渐渐散去。

'deadwoodReblooms.SolarEclipse.heavyClouds.default.0': 厚云下的天色忽然压低，太阳的缺口被云幕遮住，只剩一片模糊的暗黄从后方渗出。
'deadwoodReblooms.SolarEclipse.heavyClouds.default.1': 云底泛起灰黄色，像暴雨前的阴影又沉了一层，街道也随之暗了下来。
'deadwoodReblooms.SolarEclipse.heavyClouds.default.2': 浓云遮住天空，异常的暗光从云后扩散，把四周压成沉闷的黄灰色。
'deadwoodReblooms.SolarEclipse.heavyClouds.default.3': 最深的黑影藏在厚云之后，天空几乎失去方向，只剩低垂而沉重的云幕。
'deadwoodReblooms.SolarEclipse.heavyClouds.default.4': 太阳从阴影中缓慢恢复，厚云后方透出迟钝的亮光，昏黄开始变薄。
'deadwoodReblooms.SolarEclipse.heavyClouds.default.5': 云层依旧沉重，但地面重新有了光，远处的轮廓逐渐清晰。
'deadwoodReblooms.SolarEclipse.heavyClouds.default.6': 厚云恢复原本的阴沉，天空里那层异常的黄灰色慢慢退去。

'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.0': 稀疏的雨雪落进逐渐变暗的光里，潮湿的空气泛起一层浅浅的黄灰色。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.1': 天色继续下沉，细密的水汽模糊了远处的轮廓，也让街道显得更冷清。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.2': 昏黄的天空压在潮湿空气上，墙面和路面都比平时暗了几分。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.3': 四周短暂失去白昼感，只剩轻微的落水声和一片暗金色的天光。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.4': 光线开始回升，空气中的暗色逐渐变薄，潮湿的地面重新映出天空。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.5': 街道恢复了些许亮度，角落里仍残留一点黄灰色的湿冷光泽。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.default.6': 天色回到平常，只剩潮湿空气和短暂阴冷留在身边。

'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.0': 细雨落进变暗的日光里，雨丝隐约带着浅浅的黄灰色。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.1': 太阳被遮去更多，雨幕显得更密，地面的水痕反出暗淡的金色。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.2': 昏黄的天空压在细雨上，每一处积水都像蒙着一层旧铜色的光。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.3': 雨声变得格外清晰，街道在暗金色雨幕中短暂失去白昼感。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.4': 太阳开始恢复，雨中的暗色慢慢变薄，水面重新映出较亮的天空。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.5': 细雨仍在落下，但光线已经回升，只剩水痕里残留一点黄灰。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.rain.6': 雨色恢复平常，空气中只剩潮湿和短暂的阴冷。

'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.0': 雪花穿过变暗的日光，边缘沾上一点淡淡的黄色。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.1': 太阳缺口扩大，雪色不再干净，飘落时混着灰白和浅金。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.2': 昏黄天色让雪片显得迟缓，地面积雪反出冷淡的黄白光。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.3': 雪地失去明亮感，天地之间只剩一片暗淡的乳黄色。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.4': 光线开始恢复，雪面上的暗黄逐渐变浅，但阴影处仍显得浑浊。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.5': 雪花重新接近白色，屋顶和路边的积雪慢慢恢复清亮。
'deadwoodReblooms.SolarEclipse.lightPrecipitation.snow.6': 雪色基本恢复，只剩少量灰黄余光留在背阴处。

'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.0': 沉重的雨雪压进逐渐变暗的街道，天空像被拉成一片模糊的黄影。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.1': 天色继续下沉，远处建筑迅速隐入暗黄色的水汽之中。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.2': 天空像被水汽和阴影一起压低，街面不时闪出暗金色的反光。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.3': 远处轮廓被完全吞没，四周只剩沉重的声响和昏暗的天光。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.4': 太阳开始脱离阴影，空气中的暗黄色逐渐变稀，远处也重新有了层次。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.5': 天气仍未缓和，但街道已经从最深的昏暗中恢复过来。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.default.6': 天色回到普通的灰暗，积水或积雪上的异常反光慢慢消失。

'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.0': 大雨砸在逐渐变暗的街道上，雨幕把太阳的缺口晕成一片模糊的黄影。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.1': 雨势加深了天空的昏暗，远处建筑迅速隐入暗黄色的水汽中。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.2': 天空像被雨水和阴影一起压低，街面水流反复闪出暗金色。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.3': 暴雨吞没远处轮廓，四周只剩雨声和沉重的昏光。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.4': 太阳开始脱离阴影，雨幕中的暗黄色逐渐变稀，水流也重新有了亮度。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.5': 大雨仍未完全停下，但街道已经从最深的昏暗中恢复。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.rain.6': 雨幕回到普通的灰色，积水里的异常反光慢慢消失。

'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.0': 风雪卷过变暗的天空，飞雪外缘被染上一层淡黄。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.1': 太阳继续被遮住，暴雪中的轮廓迅速模糊，天地间只剩灰白和暗金。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.2': 异常的昏光混入风雪，方向感变得迟钝，远处几乎完全看不清。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.3': 天空和地面搅成一片沉重的黄白色，风雪像是压在身边。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.4': 太阳开始恢复，风雪中的暗黄逐渐退开，远处轮廓重新浮现。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.5': 雪势仍强，但亮度回来了，飞雪不再像刚才那样浑浊。
'deadwoodReblooms.SolarEclipse.heavyPrecipitation.snow.6': 暴雪恢复普通的苍白，积雪上的异色也慢慢散去。

'deadwoodReblooms.SolarEclipse.thunderstorm.default.0': 雷云下的太阳被咬开一道缺口，暗黄色光线从云缝间漏出。
'deadwoodReblooms.SolarEclipse.thunderstorm.default.1': 遮蔽继续加深，雷声在云层深处滚动，闪电照出的天空显得更低。
'deadwoodReblooms.SolarEclipse.thunderstorm.default.2': 云层被昏光染成黄灰色，每一次闪电都让太阳上的阴影短暂显形。
'deadwoodReblooms.SolarEclipse.thunderstorm.default.3': 雷暴和黑暗叠在一起，天空像压到了屋顶上方。
'deadwoodReblooms.SolarEclipse.thunderstorm.default.4': 太阳开始恢复，闪电后的云层不再那么昏黄，远处也重新透出亮色。
'deadwoodReblooms.SolarEclipse.thunderstorm.default.5': 雷声渐远，日光穿过云缝，天空中的暗黄色随风慢慢散开。
'deadwoodReblooms.SolarEclipse.thunderstorm.default.6': 雷云仍在，但它们已经回到普通暴风雨的阴沉。

